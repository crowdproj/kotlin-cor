name: 'CI-publish'

on:
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4 # Обновлено с v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4 # Обновлено с v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle' # Добавлено кэширование для ускорения

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3 # Обновлено с v1

      - name: Publish
        uses: gradle/actions/setup-gradle@v3
        with:
          arguments: publishAndReleaseToMavenCentral
        env:
          SIGNING_KEY_ID: ${{ secrets.OSSRH_SIGNING_KEY_ID }}
          SIGNING_KEY: ${{ secrets.OSSRH_SIGNING_SECRET_KEY_RING_FILE }}
          SIGNING_PASSWORD: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}
          NEXUS_USER: ${{ secrets.OSSRH_USER }}
          NEXUS_PASS: ${{ secrets.OSSRH_PASS }}
