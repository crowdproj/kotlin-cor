name: 'Publish'

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Extract version and release title
        run: |
          # Extract version (remove v prefix if present)
          VERSION=${GITHUB_REF#refs/tags/v}
          VERSION=${VERSION%% - *}  # Remove everything after first space
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          # Extract release title from CHANGELOG
          # Format: ## 1.0.1 - Documentation, CI/CD...
          RELEASE_TITLE=$(sed -n "s/^## $VERSION - //p" CHANGELOG.md)
          echo "RELEASE_TITLE=$RELEASE_TITLE" >> $GITHUB_ENV
          
          # Extract changelog body for this version
          # Get content between this version and next --- or end of file
          awk -v ver="$VERSION" '
            $0 ~ "^## "ver" - " {found=1; next}
            found && /^---$/ {exit}
            found {print}
          ' CHANGELOG.md > changelog.txt || true

      - name: Publish to Maven Central
        uses: gradle/actions/setup-gradle@v3
        with:
          arguments: publishAndReleaseToMavenCentral
        env:
          SIGNING_KEY_ID: ${{ secrets.OSSRH_SIGNING_KEY_ID }}
          SIGNING_KEY: ${{ secrets.OSSRH_SIGNING_SECRET_KEY_RING_FILE }}
          SIGNING_PASSWORD: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}
          NEXUS_USER: ${{ secrets.OSSRH_USER }}
          NEXUS_PASS: ${{ secrets.OSSRH_PASS }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: |
            ${{ secrets.OSSRH_SIGNING_SECRET_KEY_RING_FILE }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.OSSRH_SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USER }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASS }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref }}
          name: ${{ env.RELEASE_TITLE }}
          body_path: changelog.txt
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}