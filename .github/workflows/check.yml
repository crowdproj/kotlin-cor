name: Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: jvm
          - os: ubuntu-latest
            platform: linuxX64
          - os: macos-latest
            platform: iosX64
          - os: windows-latest
            platform: mingwX64
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check
        run: ./gradlew check -x jsTest -x jsBrowserTest -x jsNodeTest -x wasmJsTest -x wasmJsBrowserTest -x wasmJsNodeTest -x iosX64Test -x iosArm64Test -x tvosArm64Test -x tvosSimulatorArm64Test -x watchosArm32Test -x watchosArm64Test -x watchosSimulatorArm64Test -x macosArm64Test -x androidNativeX64Test -x androidNativeArm64Test -x androidNativeArm32Test -x androidNativeX86Test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.platform }}
          path: build/reports/tests/